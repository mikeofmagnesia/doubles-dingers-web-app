name: Daily Stats Update

on:
  schedule:
    # 11:45 AM CDT = 16:45 UTC (CDT = UTC-5, in effect April-November during baseball season)
    - cron: '45 16 * * *'
  workflow_dispatch: # Allow manual trigger from the Actions tab

jobs:
  update-stats:
    runs-on: ubuntu-latest

    # Required so the job can push the updated JSON files back to the repo
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stats update
        run: python src/main.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "Stats update $(date -u +%Y-%m-%d)"
          git push
